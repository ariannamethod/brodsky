<html lang="en">
<head>
<meta charset="UTF-8">

<title>BRODSKY</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { background: #0a0a0a; color: #aaa; font-family: 'Courier New', monospace;
  font-size: 14px; line-height: 1.6; height: 100%; overflow-x: hidden; }
#container { max-width: 640px; margin: 0 auto; padding: 20px 16px 120px 16px;
  min-height: 100vh; display: flex; flex-direction: column; }
#title { text-align: center; font-size: 11px; letter-spacing: 8px; color: #555;
  text-transform: uppercase; margin-bottom: 24px; padding-top: 20px; }
#poems { flex: 1; }
.cycle-header { color: #444; font-size: 11px; margin-top: 24px; margin-bottom: 4px;
  border-top: 1px solid #1a1a1a; padding-top: 12px; }
.haiku-meta { color: #333; font-size: 10px; margin-top: 12px; margin-bottom: 2px; }
.haiku { margin-bottom: 8px; }
.haiku-line { padding-left: 16px; min-height: 1.6em; }
.enjamb { color: #333; }
.punct { color: #555; }
.ghost { opacity: 0.5; font-style: italic; }
.rhyme-word { font-weight: bold; }
.cycle-footer { color: #333; font-size: 10px; margin-top: 8px; margin-bottom: 16px; }
.chambers-line { color: #333; font-size: 10px; }
.ch-hi { color: #ddd; }
.ch-lo { color: #333; }
.ch-mid { color: #666; }

.trauma { color: #c44; }
.joy { color: #cc8; }
.grief { color: #68c; }
.resonance { color: #6cc; }
.desire { color: #c6c; }
.void { color: #666; }
.rage { color: #e66; }
.tenderness { color: #6a6; }
.julia { color: #c8f; }

#input-area { position: fixed; bottom: 0; left: 0; right: 0; background: #0a0a0a;
  border-top: 1px solid #1a1a1a; padding: 12px; }
#input-wrap { max-width: 640px; margin: 0 auto; display: flex; align-items: center; }
#prompt { flex: 1; background: #111; border: 1px solid #222; color: #aaa;
  font-family: 'Courier New', monospace; font-size: 14px; padding: 8px 12px;
  outline: none; border-radius: 0; }
#prompt:focus { border-color: #444; }
#prompt::placeholder { color: #333; }
#footer { text-align: center; color: #222; font-size: 10px; margin-top: 32px;
  font-style: italic; padding-bottom: 8px; }
@media (max-width: 480px) {
  #container { padding: 12px 8px 110px 8px; }
  .haiku-line { padding-left: 8px; }
  body { font-size: 13px; }
}
</style>
</head>
<body>
<div id="container">

  <div id="poems"></div>

let vocab = [];
let vocab_size = 0;

/* Compute consonant density for Latin words */
function compute_consonant_density(w) {
  let total = 0, cons = 0;
  for (let i = 0; i < w.length; i++) {
    let c = w[i].toLowerCase();
    if (c >= 'a' && c <= 'z') {
      total++;
      if (!'aeiou'.includes(c)) cons++;
    }
  }
  return total > 0 ? cons / total : 0.0;
}

/* Adjective detection */
function is_adjective_word(w) {
  let len = w.length;
  if (len >= 3 && w.endsWith('al')) return true;
  if (len >= 4 && w.endsWith('ble')) return true;
  if (len >= 4 && w.endsWith('ous')) return true;
  if (len >= 4 && w.endsWith('ive')) return true;
  if (len >= 5 && w.endsWith('less')) return true;
  return false;
}

/* Verb detection */
function is_verb_word(w, lang) {
  let len = w.length;
  if (len < 2) return false;
  if (lang === LANG_EN && len >= 4) {
    const endings = ['ate','ize','ise','ify','lve','rge','ose','ude','ibe','ade','ode','ute','ure','ect','erb','urn','ash'];
    for (const e of endings) if (w.endsWith(e)) return true;
  }
  if (lang === LANG_RU) {
    if (w.endsWith('\u0442\u044c') || w.endsWith('\u0441\u044f')) return true;
    // Check UTF-8 Russian verb endings: ть ся
    if (w.endsWith("ть") || w.endsWith("ся") || w.endsWith("ться")) return true;
  }
  if (lang === LANG_FR && len >= 3) {
    if (w.endsWith('er') || w.endsWith('ir') || w.endsWith('re')) return true;
  }
  if (lang === LANG_ES && len >= 3) {
    if (w.endsWith('ar') || w.endsWith('er') || w.endsWith('ir')) return true;
  }
  return false;
}

/* Preposition detection */
const en_prepositions = new Set(["through","beneath","toward","across","beyond","against",
  "above","below","within","without","somewhere","nowhere","everywhere","always","never",
  "once","still","yet","already","perhaps","henceforth","hitherto","onwards","inward",
  "outward","upward","downward","forward","backward"]);
const ru_prepositions = new Set(["сквозь","навстречу","вопреки","посреди","между","никогда","нигде","никуда"]);
const fr_prepositions = new Set(["jamais","toujours","partout","ailleurs","dedans","dehors"]);
const es_prepositions = new Set(["nunca","siempre","acaso","adentro","afuera"]);
function is_preposition_word(w, lang) {
  if (lang===LANG_EN) return en_prepositions.has(w);
  if (lang===LANG_RU) return ru_prepositions.has(w);
  if (lang===LANG_FR) return fr_prepositions.has(w);
  if (lang===LANG_ES) return es_prepositions.has(w);
  return false;
}

/* Connective detection */
const en_connectives = new Set(["therefore","moreover","nevertheless","whereas","inasmuch",
  "accordingly","furthermore","notwithstanding","albeit","namely","hitherto","henceforth",
  "whereby","however","meanwhile"]);
const ru_connectives = new Set(["впрочем","однако","вопреки","притом","посреди"]);
const fr_connectives = new Set(["cependant","toutefois","pourtant","nonobstant"]);
const es_connectives = new Set(["sinembargo","noobstante","portanto"]);
function is_connective_word(w, lang) {
  if (lang===LANG_EN) return en_connectives.has(w);
  if (lang===LANG_RU) return ru_connectives.has(w);
  if (lang===LANG_FR) return fr_connectives.has(w);
  if (lang===LANG_ES) return es_connectives.has(w);
  return false;
}

/* Destiny hash — same djb2 algorithm as C */
function djb2_destiny(text) {
  let h = 5381 >>> 0;
  for (let i = 0; i < text.length; i++) h = ((h * 33) + text.charCodeAt(i)) >>> 0;
  let d = new Float32Array(DESTINY_DIM);
  for (let i = 0; i < DESTINY_DIM; i++) {
    h ^= h >>> 13; h = (h * 0x5bd1e995) >>> 0; h ^= h >>> 15;
    d[i] = ((h & 0xFFFF) / 65535.0) * 2.0 - 1.0;
  }
  return Array.from(d);
}

/* Load vocabulary */
function load_vocabulary() {
  let seen = new Set();
  for (const r of raw_vocab) {
    if (r[1] < 0.10) continue;
    if (seen.has(r[0])) continue;
    seen.add(r[0]);
    let w = {
      text: r[0], mass: r[1], syllables: r[2], emotion: r[3], lang: r[4],
      consonant_density: 0.5,
      is_adjective: false, is_verb: false, is_preposition: false, is_connective: false,
      destiny: djb2_destiny(r[0])
    };
    if (w.lang === LANG_EN || w.lang === LANG_FR || w.lang === LANG_ES)
      w.consonant_density = compute_consonant_density(w.text);
    if (w.lang === LANG_EN) w.is_adjective = is_adjective_word(w.text);
    w.is_verb = is_verb_word(w.text, w.lang);
    w.is_preposition = is_preposition_word(w.text, w.lang);
    w.is_connective = is_connective_word(w.text, w.lang);
    vocab.push(w);
  }
  vocab_size = vocab.length;
}

let rhyme_classes = new Array(MAX_RHYME_CLASSES).fill(null).map(() => []);
let word_rhyme_class = [];

function is_latin_vowel(c) { return 'aeiouy'.includes(c.toLowerCase()); }

function extract_rhyme_tail(word) {
  if (!word || word.length === 0) return '';
  let latin = 0, nonlatin = 0;
  for (let i = 0; i < word.length; i++) {
    let code = word.charCodeAt(i);
    if (code < 128) {
      let c = word[i].toLowerCase();
      if (c >= 'a' && c <= 'z') latin++;
    } else nonlatin++;
  }
  if (latin > nonlatin && latin > 0) {
    let last_vowel = -1;
    for (let i = word.length - 1; i >= 0; i--) {
      if (word.charCodeAt(i) < 128 && is_latin_vowel(word[i])) { last_vowel = i; break; }
    }
    if (last_vowel < 0) return word.slice(-2).toLowerCase();
    let start = last_vowel;
    while (start > 0 && word.charCodeAt(start-1) < 128 && is_latin_vowel(word[start-1])) start--;
    let tail_len = word.length - start;
    if (tail_len <= 1 && start > 0) {
      let ext = start - 1;
      while (ext > 0 && word.charCodeAt(ext-1) < 128 &&
             /[a-zA-Z]/.test(word[ext-1]) && !is_latin_vowel(word[ext-1])) ext--;
      while (ext > 0 && word.charCodeAt(ext-1) < 128 && is_latin_vowel(word[ext-1])) ext--;
      start = ext;
    }
    return word.slice(start).toLowerCase();
  } else {
    return word.slice(-4);
  }
}

/* Corpus bigrams */
let corpus_bg = { src: [], dst: [], weight: [], count: 0 };
function corpus_bg_add(s, d, w) {
  for (let i = 0; i < corpus_bg.count; i++) {
    if (corpus_bg.src[i] === s && corpus_bg.dst[i] === d) { corpus_bg.weight[i] += w; return; }
  }
  if (corpus_bg.count < CORPUS_BIGRAM_MAX) {
    corpus_bg.src.push(s); corpus_bg.dst.push(d); corpus_bg.weight.push(w); corpus_bg.count++;
  }
}
function corpus_bigram_score(last_word, cand) {
  if (last_word < 0) return 0;
  for (let i = 0; i < corpus_bg.count; i++)
    if (corpus_bg.src[i] === last_word && corpus_bg.dst[i] === cand) return corpus_bg.weight[i];
  return 0;
}
function corpus_best_bigram(word_idx) {
  if (word_idx < 0) return -1;
  let best = -1, best_w = 0;
  for (let i = 0; i < corpus_bg.count; i++) {
    if (corpus_bg.src[i] === word_idx && corpus_bg.weight[i] > best_w) {
      best_w = corpus_bg.weight[i]; best = corpus_bg.dst[i];
    }
  }
  return best;
}

/* Corpus Hebbian */
let corpus_hb = { word_a: [], word_b: [], weight: [], count: 0 };
function corpus_hb_add(a, b, w) {
  if (a === b) return;
  if (a > b) { let t = a; a = b; b = t; }
  for (let i = 0; i < corpus_hb.count; i++) {
    if (corpus_hb.word_a[i] === a && corpus_hb.word_b[i] === b) { corpus_hb.weight[i] += w; return; }
  }
  if (corpus_hb.count < CORPUS_HEBBIAN_MAX) {
    corpus_hb.word_a.push(a); corpus_hb.word_b.push(b); corpus_hb.weight.push(w); corpus_hb.count++;
  }
}
function corpus_hebbian_score(last_word, cand) {
  if (last_word < 0) return 0;
  let a = last_word, b = cand;
  if (a > b) { let t = a; a = b; b = t; }
  for (let i = 0; i < corpus_hb.count; i++)
    if (corpus_hb.word_a[i] === a && corpus_hb.word_b[i] === b) return corpus_hb.weight[i];
  return 0;
}

/* Build vocab index for lookup */
let vocab_index = {};
function build_vocab_index() {
  for (let i = 0; i < vocab_size; i++) {
    vocab_index[vocab[i].text] = i;
    vocab_index[vocab[i].text.toLowerCase()] = i;
  }
}

function find_vocab_word(word) {
  let w = word.toLowerCase();
  if (vocab_index[w] !== undefined) return vocab_index[w];
  if (vocab_index[word] !== undefined) return vocab_index[word];
  return -1;
}

function parse_corpus_line(line) {
  let words = line.split(/\s+/).filter(w => w.length > 0);
  let ids = [];
  for (let w of words) {
    // Strip common French articles/particles for matching
    let clean = w.replace(/^(le|la|les|l\'|de|du|des|un|une)$/i, '');
    if (!clean) continue;
    let id = find_vocab_word(clean);
    if (id < 0) id = find_vocab_word(w);
    if (id >= 0) ids.push(id);
  }
  return ids;
}

function load_all_corpora() {
  corpus_bg = { src: [], dst: [], weight: [], count: 0 };
  corpus_hb = { word_a: [], word_b: [], weight: [], count: 0 };
  let total = 0;
  for (let lang of ['en','ru','he','fr','es']) {
    let lines = raw_corpus[lang] || [];
    for (let line of lines) {
      let ids = parse_corpus_line(line);
      if (ids.length < 2) continue;
      total++;
      for (let i = 0; i < ids.length - 1; i++) corpus_bg_add(ids[i], ids[i+1], 1.0);
      for (let i = 0; i < ids.length; i++) {
        for (let j = i+1; j < ids.length && j < i+CORPUS_HEBBIAN_WIN; j++) {
          corpus_hb_add(ids[i], ids[j], 1.0 / (j - i));
        }
      }
    }
  }
  return total;
}

    if ((hebbian.word_a[i]===a && hebbian.word_b[i]===b) ||

    for (let i = 1; i < prophecy.p.length; i++) if (prophecy.p[i].age > prophecy.p[oldest].age) oldest = i;
    prophecy.p[oldest] = { target, strength, age: 0, fulfilled: false };
    prophecy.created_total++;
  }
}
function prophecy_update(generated_word) {
  for (let p of prophecy.p) {
    if (!p.fulfilled && p.target === generated_word) { p.fulfilled = true; prophecy.fulfilled_total++; }
  }
  for (let p of prophecy.p) p.age++;
  prophecy.p = prophecy.p.filter(p => p.age <= 50 && !p.fulfilled);
}

/* ─── CHAMBERS (Kuramoto) ────────────────────────────────────────── */
let chambers = { phase: new Float32Array(CH_COUNT), freq: new Float32Array(CH_COUNT), coupling: 0.5 };
function chambers_init() {
  chambers.coupling = 0.5;
  for (let i = 0; i < CH_COUNT; i++) {
    chambers.phase[i] = rng_float() * 2 * Math.PI;
    chambers.freq[i] = 0.8 + rng_float() * 0.4;
  }
}
function chambers_step(dt) {
  let np = new Float32Array(CH_COUNT);
  for (let i = 0; i < CH_COUNT; i++) {
    let cs = 0;
    for (let j = 0; j < CH_COUNT; j++) if (j !== i) cs += Math.sin(chambers.phase[j] - chambers.phase[i]);
    np[i] = chambers.phase[i] + dt * (chambers.freq[i] + chambers.coupling / (CH_COUNT-1) * cs);
    np[i] = np[i] % (2 * Math.PI);
    if (np[i] < 0) np[i] += 2 * Math.PI;
  }
  chambers.phase.set(np);
}
function chamber_activation(ch) { return Math.sin(chambers.phase[ch]); }

/* ─── PARLIAMENT ─────────────────────────────────────────────────── */
let parliament = { e: [], n: DOE_EXPERTS, elections: 0 };
function parliament_init() {
  parliament = { e: [], n: DOE_EXPERTS, elections: 0 };
  // Architect
  parliament.e.push({ bias: [0,0,0,0,0,0.5,0,0,0], mass_pref:0.7, vitality:1, overload:0, wins:0, alive:true });
  // Anatomist
  parliament.e.push({ bias: [0.5,0,0,0,0,0,0.3,0,0], mass_pref:0.6, vitality:1, overload:0, wins:0, alive:true });
  // Exile
  parliament.e.push({ bias: [0,0,0,0,0,0,0,0,0.5], mass_pref:0.5, vitality:1, overload:0, wins:0, alive:true });
  // Metronome
  parliament.e.push({ bias: [0,0,0,0.5,0,0,0,0,0], mass_pref:0.5, vitality:1, overload:0, wins:0, alive:true });
}
function expert_vote(ex, idx, w, julia) {
  if (!ex.alive) return 0;
  let vote = (ex.bias[w.emotion] || 0) * ex.vitality;
  vote += (1 - Math.abs(w.mass - ex.mass_pref)) * 0.3 * ex.vitality;
  if (idx === 2) vote *= (1 + julia * 1.5);
  return vote;
}
function parliament_score(widx) {
  let w = vocab[widx];
  let total = 0, n_alive = 0;
  for (let i = 0; i < parliament.n; i++) {
    if (!parliament.e[i].alive) continue;
    total += expert_vote(parliament.e[i], i, w, org.julia);
    n_alive++;
  }
  return n_alive === 0 ? 0 : total / n_alive;
}
function parliament_update(winner_word) {
  let best = -1, best_i = -1;
  for (let i = 0; i < parliament.n; i++) {
    if (!parliament.e[i].alive) continue;
    let v = expert_vote(parliament.e[i], i, vocab[winner_word], org.julia);
    if (v > best) { best = v; best_i = i; }
  }
  if (best_i >= 0) {
    parliament.e[best_i].wins++;
    parliament.e[best_i].overload += 0.1;
    parliament.e[best_i].vitality = clampf(parliament.e[best_i].vitality + 0.02, 0.1, 2.0);
  }
  for (let i = 0; i < parliament.n; i++) {
    if (i === best_i || !parliament.e[i].alive) continue;
    parliament.e[i].vitality *= 0.99;
  }
  parliament.elections++;
}
function parliament_lifecycle() {
  for (let i = 0; i < parliament.n; i++) {
    if (!parliament.e[i].alive) continue;
    if (parliament.e[i].overload > 3.0 && parliament.n < DOE_EXPERTS * 2) {
      let child = Object.assign({}, parliament.e[i]);
      child.bias = [...parliament.e[i].bias];
      child.vitality *= 0.6; child.overload = 0; child.wins = 0;
      for (let e = 0; e < EMO_COUNT; e++) child.bias[e] += (rng_float()-0.5)*0.1;
      parliament.e.push(child); parliament.n++;
      parliament.e[i].vitality *= 0.6; parliament.e[i].overload = 0;
    }
    if (parliament.e[i].vitality < 0.15 && parliament.n > 2) parliament.e[i].alive = false;
  }
}
function parliament_alive_count() {
  let n = 0; for (let i = 0; i < parliament.n; i++) if (parliament.e[i].alive) n++;
  return n;
}

/* ─── PLANETARY DISSONANCE ───────────────────────────────────────── */
const planet_periods = [87.97, 224.7, 365.25, 687.0, 4332.6, 10759.2, 30687.0, 60190.0];
const planet_lang = [LANG_ES, LANG_FR, LANG_EN, LANG_RU, LANG_EN, LANG_HE, LANG_EN, LANG_EN];

function planetary_dissonance() {
  let now = Date.now() / 1000;
  let j2000 = 946728000;
  let days = (now - j2000) / 86400;
  let rx = 0, ry = 0;
  for (let k = 0; k < 8; k++) {
    let theta = (2 * Math.PI * days / planet_periods[k]) % (2 * Math.PI);
    rx += Math.cos(theta); ry += Math.sin(theta);
  }
  let R = Math.sqrt(rx*rx + ry*ry) / 8;
  return 1 - R;
}

function calendar_dissonance() {
  let now = new Date();
  let start = new Date(now.getFullYear(), 0, 0);
  let diff = now - start;
  let day_of_year = Math.floor(diff / 86400000);
  let drift = (day_of_year * 11.25 / 365.25) % 1.0;
  return 0.5 - Math.abs(drift - 0.5);
}

function current_season() {
  let m = new Date().getMonth();
  if (m >= 2 && m <= 4) return SEASON_SPRING;
  if (m >= 5 && m <= 7) return SEASON_SUMMER;
  if (m >= 8 && m <= 10) return SEASON_AUTUMN;
  return SEASON_WINTER;
}

function ghost_language() {
  let now = Date.now() / 1000;
  let j2000 = 946728000;
  let days = (now - j2000) / 86400;
  let max_diss = -1, max_planet = 0;
  for (let k = 0; k < 8; k++) {
    let theta = (2 * Math.PI * days / planet_periods[k]) % (2 * Math.PI);
    let diss = 1 - Math.cos(theta);
    if (diss > max_diss) { max_diss = diss; max_planet = k; }
  }
  return planet_lang[max_planet];
}

/* ─── LANGUAGE DETECTION ─────────────────────────────────────────── */
function detect_language(text) {
  let cyrillic = 0, hebrew = 0, french = 0, spanish = 0;
  for (let i = 0; i < text.length; i++) {
    let code = text.charCodeAt(i);
    if (code >= 0x0590 && code <= 0x05FF) hebrew++;
    else if (code >= 0x0400 && code <= 0x04FF) cyrillic++;
    else if (code === 0x00F1) spanish++;  // ñ
    else if (code >= 0x00C0 && code <= 0x00FF) {
      if (code === 0x00E9 || code === 0x00E8 || code === 0x00EA || code === 0x00EB ||
          code === 0x00E0 || code === 0x00E2 || code === 0x00E7 || code === 0x00F9 ||
          code === 0x00EE || code === 0x00F4) french++;
      else if (code === 0x00E1 || code === 0x00F3 || code === 0x00FA) { spanish++; french++; }
    }
    else if (code === 0x00BF || code === 0x00A1) spanish++;
  }
  if (hebrew > 0 && hebrew >= cyrillic && hebrew >= french && hebrew >= spanish) return LANG_HE;
  if (cyrillic > 0 && cyrillic >= hebrew && cyrillic >= french && cyrillic >= spanish) return LANG_RU;
  if (spanish > french && spanish > 0) return LANG_ES;
  if (french > 0) return LANG_FR;
  // Fallback: check vocab matches
  let words = text.toLowerCase().split(/\s+/);
  let hits = [0,0,0,0,0];
  for (let w of words) {
    for (let i = 0; i < vocab_size; i++) {
      if (vocab[i].text === w) { hits[vocab[i].lang]++; break; }
    }
  }
  let best = LANG_EN;
  for (let l = 1; l < LANG_COUNT; l++) if (hits[l] > hits[best]) best = l;
  return best;
}

/* ─── ORGANISM STATE ─────────────────────────────────────────────── */
let org = {};

function organism_init() {

/* ─── INGEST PROMPT ──────────────────────────────────────────────── */
function ingest_prompt(text) {
  org.current_lang = detect_language(text);
  let words = text.split(/\s+/).filter(w => w.length > 0);
  let n_words = words.length, n_known = 0;
  let known_ids = [];
  for (let w of words) {
    let id = find_vocab_word(w.toLowerCase());
    if (id >= 0) { n_known++; known_ids.push(id); }
  }
  let dissonance = n_words > 0 ? 1 - n_known / n_words : 1;
  // Hebbian from known words
  for (let i = 0; i < known_ids.length; i++)
    for (let j = i+1; j < known_ids.length && j < i+5; j++)
      hebbian_record(known_ids[i], known_ids[j]);
  // Emotional charge → chambers
  for (let id of known_ids) {
    let emo = vocab[id].emotion, mass = vocab[id].mass;
    switch (emo) {
      case EMO_TRAUMA: chambers.phase[CH_FEAR] += mass * 0.8; break;
      case EMO_TENDERNESS: chambers.phase[CH_LOVE] += mass * 0.8; break;
      case EMO_RAGE: chambers.phase[CH_RAGE] += mass * 0.8; break;
      case EMO_VOID: chambers.phase[CH_VOID] += mass * 0.8; break;
      case EMO_RESONANCE: chambers.phase[CH_FLOW] += mass * 0.8; break;
      case EMO_JULIA: org.julia += mass * 0.5; break;
      case EMO_GRIEF: chambers.phase[CH_VOID] += mass * 0.5; chambers.phase[CH_FEAR] += mass * 0.3; break;
      case EMO_DESIRE: chambers.phase[CH_LOVE] += mass * 0.4; chambers.phase[CH_FLOW] += mass * 0.3; break;
    }
  }
  if (dissonance > 0.7) chambers.phase[CH_FEAR] += dissonance * 0.2;
  return dissonance;
}

/* ─── CYCLE RESET ────────────────────────────────────────────────── */
function cycle_reset() {

/* ─── SCORE WORD ─────────────────────────────────────────────────── */
function score_word(idx) {
  let w = vocab[idx];
  // Layer 1: Corpus
  let corpus_pull = 0;
  corpus_pull += corpus_bigram_score(org.last_word, idx) * 1.5;
  corpus_pull += corpus_hebbian_score(org.last_word, idx) * 1.0;
  corpus_pull += bigram[org.last_emotion][w.emotion] * 0.5;
  if (org.last_word >= 0) corpus_pull += hebbian_score(org.last_word, idx) * 0.5;
  let tens = tension_score(org.last_word, idx);
  corpus_pull += tens * 3.0;
  if (corpus_pull < 0) corpus_pull = 0;

  // Layer 2: Dario overlay
  let dario = 0;
  let dist = vec_dist(w.destiny, org.destiny);
  let julia_stretch = 1 + org.julia * JULIA_STRETCH;
  let attraction = 1 / (1 + dist * julia_stretch);
  dario += attraction * 0.6;
  let target_ch = emo_to_ch[w.emotion];
  let ch_act = chamber_activation(target_ch);
  dario += (ch_act > 0 ? ch_act : 0) * 0.4;
  if (w.emotion === EMO_TRAUMA) dario += org.planet_diss * 0.3;
  if (w.emotion === EMO_GRIEF || w.emotion === EMO_VOID) dario += org.cal_diss * 0.2;
  if (w.emotion === EMO_JULIA) dario += org.julia * 0.5;
  // Prophecy pull
  let prophecy_pull = 0;
  for (let p of prophecy.p) {
    if (!p.fulfilled && p.target === idx) prophecy_pull += p.strength * Math.log(1 + p.age);
  }
  dario += prophecy_pull * 0.4;
  dario += season_bias[org.season][w.emotion] * 0.1;
  dario += parliament_score(idx) * 0.5;
  if (dario < 0) dario = 0;

  return w.mass * (1 + corpus_pull) * (1 + dario);
}

/* ─── SAMPLE WORD ────────────────────────────────────────────────── */
function sample_word(syl_remaining, force_max_syl, target_lang, ghost_lang, ghost_state, rhyme_target) {
  let logits = [], candidates = [];
  for (let i = 0; i < vocab_size; i++) {
    if (vocab[i].syllables > syl_remaining) continue;
    if (org.used.has(i)) continue;
    candidates.push(i);
    logits.push(score_word(i));
  }
  if (candidates.length === 0) return -1;

  // Language filter
  {
    let new_c = [], new_l = [];
    for (let i = 0; i < candidates.length; i++) {
      let wlang = vocab[candidates[i]].lang;
      if (wlang === target_lang) { new_c.push(candidates[i]); new_l.push(logits[i]); }
      else if (ghost_lang >= 0 && wlang === ghost_lang && ghost_state && !ghost_state.used) {
        new_c.push(candidates[i]); new_l.push(logits[i] * 0.3);
      }
    }
    if (new_c.length > 0) { candidates = new_c; logits = new_l; }
  }

  // Mass weighting
  for (let i = 0; i < candidates.length; i++) {
    let m = vocab[candidates[i]].mass;
    if (m < 0.12) logits[i] *= 0.001;
    else if (m < 0.20) logits[i] *= 0.02;
    else logits[i] *= (0.15 + 0.85 * m);
  }

  // Consecutive light word penalty
  if (org.last_word >= 0 && vocab[org.last_word].mass < 0.30) {
    for (let i = 0; i < candidates.length; i++) {
      if (vocab[candidates[i]].mass < 0.30) logits[i] *= 0.005;
    }
  }

  // Consonant density
  for (let i = 0; i < candidates.length; i++)
    logits[i] *= (1 + 0.5 * vocab[candidates[i]].consonant_density);

  // Syllable greed
  if (!force_max_syl) {
    for (let i = 0; i < candidates.length; i++) {
      let s = vocab[candidates[i]].syllables;
      if (s >= 4) logits[i] *= 3.0;
      else if (s >= 3) logits[i] *= 2.2;
      else if (s === 2) logits[i] *= 1.4;
    }
  } else {
    for (let i = 0; i < candidates.length; i++) {
      if (vocab[candidates[i]].syllables === syl_remaining) logits[i] *= 5.0;
    }
  }

  // Adjacent adjective penalty
  if (org.prev_was_adj) {
    for (let i = 0; i < candidates.length; i++) {
      if (vocab[candidates[i]].is_adjective) logits[i] *= 0.05;
    }
  }

  // Velocity
  let vel_mult = 1.0;
  switch (org.velocity) {
    case VEL_RUN: vel_mult = 1.3; break;
    case VEL_STOP: vel_mult = 0.7; break;
    case VEL_BREATHE: vel_mult = 0.8; break;
    case VEL_UP: vel_mult = 1.1; break;
    case VEL_DOWN: vel_mult = 0.9; break;
  }
  for (let i = 0; i < candidates.length; i++) logits[i] *= vel_mult;

  // Rhyme filter
  if (rhyme_target >= 0 && rng_float() > 0.25) {
    let n_rhyme = 0;
    for (let i = 0; i < candidates.length; i++) {
      let ci = candidates[i];
      if (ci !== rhyme_target && (words_rhyme(ci, rhyme_target) || words_near_rhyme(ci, rhyme_target)))
        n_rhyme++;
    }
    if (n_rhyme >= 2) {
      for (let i = 0; i < candidates.length; i++) {
        let ci = candidates[i];
        if (ci === rhyme_target) logits[i] = 0;
        else if (!words_rhyme(ci, rhyme_target) && !words_near_rhyme(ci, rhyme_target)) logits[i] = 0;
      }
    }
  }

  // Softmax with temperature
  let max_l = -1e30;
  for (let l of logits) if (l > max_l) max_l = l;
  let sum = 0;
  for (let i = 0; i < logits.length; i++) {
    logits[i] = Math.exp((logits[i] - max_l) / org.tau);
    sum += logits[i];
  }
  if (sum < 1e-10) sum = 1e-10;

  let r = rng_float() * sum, cumsum = 0;
  let picked = candidates[candidates.length - 1];
  for (let i = 0; i < candidates.length; i++) {
    cumsum += logits[i];
    if (cumsum >= r) { picked = candidates[i]; break; }
  }

  // Track ghost
  if (ghost_state && ghost_lang >= 0 && vocab[picked].lang === ghost_lang && vocab[picked].lang !== target_lang) {
    ghost_state.used = true;
  }

  return picked;
}

/* ─── GENERATE LINE ──────────────────────────────────────────────── */
function generate_line(target_syl, target_lang, ghost_lang, ghost_state, rhyme_target) {
  let line = { words: [], syllables: 0 };
  while (line.syllables < target_syl && line.words.length < MAX_LINE_WORDS) {
    let remaining = target_syl - line.syllables;
    let force = remaining <= 2;
    let rt = (remaining <= 3 && rhyme_target >= 0) ? rhyme_target : -1;
    let idx = sample_word(remaining, force, target_lang, ghost_lang, ghost_state, rt);
    if (idx < 0) break;
    line.words.push(idx);
    line.syllables += vocab[idx].syllables;
    org.acc_mass += vocab[idx].mass;
    if (org.last_word >= 0) {
      hebbian_record(org.last_word, idx);
      corpus_bg_add(org.last_word, idx, CORPUS_ONLINE_DECAY);
      corpus_hb_add(org.last_word, idx, CORPUS_ONLINE_DECAY);
      tension_used(org.last_word, idx);
    }
    prophecy_update(idx);
    let pred = corpus_best_bigram(idx);
    if (pred >= 0) prophecy_add(pred, 0.5);
    org.last_emotion = vocab[idx].emotion;
    org.prev_was_adj = vocab[idx].is_adjective;
    org.last_word = idx;
    org.used.add(idx);
    parliament_update(idx);
  }
  return line;
}

/* ─── CAPITALIZE ─────────────────────────────────────────────────── */
function capitalize_word(text) {
  if (!text || text.length === 0) return text;
  let code = text.charCodeAt(0);
  // ASCII Latin
  if (code >= 97 && code <= 122) return String.fromCharCode(code - 32) + text.slice(1);
  // Cyrillic lowercase а-я (0x0430-0x044F) → А-Я (0x0410-0x042F)
  if (code >= 0x0430 && code <= 0x044F) return String.fromCharCode(code - 32) + text.slice(1);
  // ё (0x0451) → Ё (0x0401)
  if (code === 0x0451) return '\u0401' + text.slice(1);
  return text;
}

/* ─── PUNCTUATION ────────────────────────────────────────────────── */
function line_primary_lang(line) {
  let counts = [0,0,0,0,0];
  for (let w of line.words) { let l = vocab[w].lang; if (l >= 0 && l < LANG_COUNT) counts[l]++; }
  let best = LANG_EN;
  for (let l = 1; l < LANG_COUNT; l++) if (counts[l] > counts[best]) best = l;
  return best;
}

function punctuate_line(line) {
  let n = line.words.length;
  if (n === 0) return [];
  let lang = line_primary_lang(line);
  let marks = [];
  for (let i = 0; i < n; i++) marks.push({ pre_punct:'', post_punct:'', capitalize:false, ghost:false });
  marks[0].capitalize = true;
  let after_period = true;

  for (let i = 0; i < n; i++) {
    let idx = line.words[i];
    let ghost = vocab[idx].lang !== lang;
    marks[i].ghost = ghost;
    if (ghost) continue;

    let skip_punct = rng_float() < 0.25;
    if (skip_punct) {
      if (after_period && i > 0) marks[i].capitalize = true;
      after_period = false;
      continue;
    }

    if (vocab[idx].is_connective && i > 0) {
      marks[i].pre_punct = '. ';
      marks[i].capitalize = true;
      after_period = false;
      continue;
    }

    if (after_period && i > 0) marks[i].capitalize = true;
    after_period = false;

    if (vocab[idx].is_verb) {
      let next_real = -1;
      for (let j = i+1; j < n; j++) if (vocab[line.words[j]].lang === lang) { next_real = j; break; }
      if (next_real < 0) {
        if (vocab[idx].mass > 0.80 && (vocab[idx].emotion===EMO_TRAUMA||vocab[idx].emotion===EMO_RAGE) && rng_float()<0.10)
          marks[i].post_punct = '!';
        else marks[i].post_punct = '.';
        after_period = true;
      } else if (vocab[line.words[next_real]].is_preposition) {
        // glue
      } else {
        if (vocab[idx].mass > 0.80 && (vocab[idx].emotion===EMO_TRAUMA||vocab[idx].emotion===EMO_RAGE) && rng_float()<0.10)
          marks[i].post_punct = '!';
        else marks[i].post_punct = '.';
        after_period = true;
      }
      continue;
    }

    if (vocab[idx].is_preposition && i > 0) {
      let prev_real = -1;
      for (let j = i-1; j >= 0; j--) if (vocab[line.words[j]].lang === lang) { prev_real = j; break; }
      if (prev_real >= 0 && vocab[line.words[prev_real]].is_verb) {
        marks[i].post_punct = '.';
        after_period = true;
        continue;
      }
    }

    if (i > 0 && !vocab[idx].is_verb && !vocab[idx].is_adjective &&
        !vocab[idx].is_connective && !vocab[idx].is_preposition) {
      let prev_real = -1;
      for (let j = i-1; j >= 0; j--) if (vocab[line.words[j]].lang === lang) { prev_real = j; break; }
      if (prev_real >= 0) {
        let pidx = line.words[prev_real];
        if (!vocab[pidx].is_verb && !vocab[pidx].is_connective &&
            !vocab[pidx].is_preposition && marks[prev_real].post_punct === '') {
          let tens = tension_score(pidx, idx);
          if (tens > 0) marks[i].pre_punct = ' \u2014 ';
          else marks[i].pre_punct = ', ';
        }
      }
    }

    if (i === n-1 && marks[i].post_punct === '' && !ghost) {
      if (vocab[idx].mass > 0.80 && (vocab[idx].emotion===EMO_TRAUMA||vocab[idx].emotion===EMO_RAGE) && rng_float()<0.10)
        marks[i].post_punct = '!';
      else marks[i].post_punct = '.';
    }
  }
  return marks;
}

/* ─── GENERATE HAIKU ─────────────────────────────────────────────── */
function generate_haiku() {
  let target_syl = [5, 7, 5];
  let tlang = org.current_lang;
  let glang = ghost_language();
  if (glang === tlang) glang = -1;
  let ghost_state = { used: false };

  if (org.enjamb) {
    for (let d = 0; d < DESTINY_DIM; d++)
      org.destiny[d] = 0.6 * org.destiny[d] + 0.4 * org.enjamb_destiny[d];
    vec_normalize(org.destiny);
    org.enjamb = false;
  }

  // Line 1: rhyme with prev haiku's middle end (terza rima chain)
  let line1_rhyme = org.prev_middle_end;
  let line1 = generate_line(target_syl[0], tlang, -1, null, line1_rhyme);

  let end_word_0 = line1.words.length > 0 ? line1.words[line1.words.length-1] : -1;
  let dest_after_l1 = [...org.destiny];

  // Drift destiny
  for (let d = 0; d < DESTINY_DIM; d++) org.destiny[d] += (rng_float()-0.5)*0.1;
  vec_normalize(org.destiny);

  // Line 2: ghost allowed, free rhyme
  let line2 = generate_line(target_syl[1], tlang, glang, ghost_state, -1);

  let end_word_1 = line2.words.length > 0 ? line2.words[line2.words.length-1] : -1;
  let dest_after_l2 = [...org.destiny];

  // Line 3: destiny = avg, rhyme with line 1
  for (let d = 0; d < DESTINY_DIM; d++) org.destiny[d] = 0.5*dest_after_l1[d] + 0.5*dest_after_l2[d];
  vec_normalize(org.destiny);

  let line3 = generate_line(target_syl[2], tlang, -1, null, end_word_0);

  org.prev_middle_end = end_word_1;

  let has_enjamb = org.julia > 0.3;
  if (has_enjamb) {
    org.enjamb_destiny = [...org.destiny];
    org.enjamb = true;
  }

  return { lines: [line1, line2, line3], has_enjamb };
}

/* ─── INTER-HAIKU UPDATES ────────────────────────────────────────── */
function inter_haiku_update() {
  chambers_step(0.3);
  org.julia += 0.08 + rng_float() * 0.05;
  // Prophecy debt
  let debt = 0;
  for (let p of prophecy.p) if (!p.fulfilled) debt += p.age * 0.01;
  org.julia += debt * 0.05;
  if (org.julia > 1) org.julia = 1;

  let frag = rng_next() % EXHALE_COUNT;
  for (let d = 0; d < DESTINY_DIM; d++) org.destiny[d] += exhale[frag].destiny[d] * 0.05;
  vec_normalize(org.destiny);

  org.alpha += (rng_float()-0.5)*0.02;
  org.beta += (rng_float()-0.5)*0.02;
  org.gamma_w += (rng_float()-0.5)*0.02;
  org.trauma_w += (rng_float()-0.5)*0.02;
  org.alpha = Math.max(0, org.alpha);
  org.beta = Math.max(0, org.beta);
  org.gamma_w = Math.max(0, org.gamma_w);
  org.trauma_w = Math.max(0, org.trauma_w);

  org.tau = TAU_BASE + org.julia * 0.3 - org.planet_diss * 0.2;
  org.tau = clampf(org.tau, 0.5, 2.5);

  parliament_lifecycle();

  let v = rng_float();
  if (v < 0.1) org.velocity = VEL_STOP;
  else if (v < 0.2) org.velocity = VEL_BREATHE;
  else if (v < 0.35) org.velocity = VEL_RUN;
  else if (v < 0.45) org.velocity = VEL_UP;
  else if (v < 0.55) org.velocity = VEL_DOWN;
  else org.velocity = VEL_WALK;
}

/* ─── STOP PROBABILITY ───────────────────────────────────────────── */
function should_stop_cycle() {
  if (org.haiku_in_cycle >= MAX_CYCLE_HAIKU) return true;
  if (org.haiku_in_cycle < 2) return false;
  let saturation = org.haiku_in_cycle / MAX_CYCLE_HAIKU;
  let x = org.acc_mass * 0.15 + saturation * 0.6 + org.planet_diss * 0.2 + org.julia * 0.3 - 2.5;
  return rng_float() < sigmoid(x);
}

/* ─── SPORE (localStorage) ───────────────────────────────────────── */
function spore_save() {
  try {
    let data = {
      tensions: tensions.map(t => ({ use_count: t.use_count, crystallized: t.crystallized })),
      chambers_phase: Array.from(chambers.phase),
      julia: org.julia * 0.3,
      total_cycles: org.total_cycles,
      prophecy: { n: prophecy.p.length, fulfilled_total: prophecy.fulfilled_total, created_total: prophecy.created_total },
      parliament: {
        n: parliament.n, elections: parliament.elections,
        experts: parliament.e.map(e => ({ bias: [...e.bias], mass_pref: e.mass_pref,
          vitality: e.vitality, overload: e.overload, wins: e.wins, alive: e.alive }))
      }
    };
    localStorage.setItem('brodsky_spore', JSON.stringify(data));
  } catch(e) {}
}

function spore_load() {
  try {
    let raw = localStorage.getItem('brodsky_spore');
    if (!raw) return;
    let data = JSON.parse(raw);
    if (data.tensions) {
      for (let i = 0; i < Math.min(data.tensions.length, tensions.length); i++) {
        tensions[i].use_count = data.tensions[i].use_count || 0;
        tensions[i].crystallized = data.tensions[i].crystallized || false;
      }
    }
    if (data.chambers_phase) {
      for (let i = 0; i < Math.min(data.chambers_phase.length, CH_COUNT); i++)
        chambers.phase[i] = data.chambers_phase[i];
    }
    if (data.julia !== undefined) org.julia = data.julia;
    if (data.total_cycles) org.total_cycles = data.total_cycles;
    if (data.parliament && data.parliament.experts) {
      parliament.n = data.parliament.n || DOE_EXPERTS;
      parliament.elections = data.parliament.elections || 0;
      parliament.e = data.parliament.experts.map(e => ({
        bias: e.bias || new Array(EMO_COUNT).fill(0),
        mass_pref: e.mass_pref || 0.5,
        vitality: e.vitality || 1.0,
        overload: e.overload || 0,
        wins: e.wins || 0,
        alive: e.alive !== undefined ? e.alive : true
      }));
    }
  } catch(e) {}
}

/* ─── RENDER ─────────────────────────────────────────────────────── */
function render_haiku(h) {
  let end0 = h.lines[0].words.length > 0 ? h.lines[0].words[h.lines[0].words.length-1] : -1;
  let end2 = h.lines[2].words.length > 0 ? h.lines[2].words[h.lines[2].words.length-1] : -1;

  let html = '<div class="haiku">';
  for (let ln = 0; ln < 3; ln++) {
    let line = h.lines[ln];
    let marks = punctuate_line(line);
    html += '<div class="haiku-line">';
    for (let w = 0; w < line.words.length; w++) {
      let idx = line.words[w];
      let emo_cls = emo_classes[vocab[idx].emotion];
      let is_rhyme = false;
      if (w === line.words.length - 1) {
        if (ln === 2 && end0 >= 0 && end2 >= 0 && words_rhyme(end0, end2)) is_rhyme = true;
        if (ln === 0 && end0 >= 0 && end2 >= 0 && words_rhyme(end0, end2)) is_rhyme = true;
      }

      // Pre-punctuation
      if (marks[w].pre_punct) {
        html += '<span class="punct">' + escapeHtml(marks[w].pre_punct) + '</span>';
      } else if (w > 0) {
        html += ' ';
      }

      // Word
      let text = vocab[idx].text;
      if (marks[w].capitalize && !marks[w].ghost) text = capitalize_word(text);
      let classes = emo_cls;
      if (marks[w].ghost) classes += ' ghost';
      if (is_rhyme) classes += ' rhyme-word';
      html += '<span class="' + classes + '">' + escapeHtml(text) + '</span>';

      // Post-punctuation
      if (marks[w].post_punct) {
        html += '<span class="punct">' + escapeHtml(marks[w].post_punct) + '</span>';
      }
    }
    if (ln === 2 && h.has_enjamb) html += ' <span class="enjamb">--</span>';
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render_chambers() {
  let html = '<span class="chambers-line">chambers: ';
  for (let i = 0; i < CH_COUNT; i++) {
    let a = chamber_activation(i);
    let cls = a > 0.3 ? 'ch-hi' : (a < -0.3 ? 'ch-lo' : 'ch-mid');
    html += '<span class="' + cls + '">' + ch_short[i] + a.toFixed(1) + '</span> ';
  }
  html += '</span>';
  return html;
}

/* ─── GENERATE CYCLE ─────────────────────────────────────────────── */
function generate_cycle() {
  cycle_reset();
  org.total_cycles++;
  let cycle_num = org.total_cycles;

  let poems_div = document.getElementById('poems');

  // Cycle header
  let header = document.createElement('div');
  header.className = 'cycle-header';
  header.innerHTML = '<b>cycle ' + cycle_num + '</b> &middot; ' +
    season_names[org.season] + ' &middot; planet ' + org.planet_diss.toFixed(2) +
    ' &middot; calendar ' + org.cal_diss.toFixed(2) +
    ' &middot; parliament: ' + parliament_alive_count() + ' alive, ' + parliament.elections + ' elections';
  poems_div.appendChild(header);

  // Chambers
  let ch_div = document.createElement('div');
  ch_div.className = 'chambers-line';
  ch_div.innerHTML = render_chambers();
  poems_div.appendChild(ch_div);

  do {
    org.haiku_in_cycle++;

    // Haiku meta
    let meta = document.createElement('div');
    meta.className = 'haiku-meta';
    meta.innerHTML = '[' + org.haiku_in_cycle + '] ' +
      '<span class="julia">julia=' + org.julia.toFixed(2) + '</span> ' +
      '\u03c4=' + org.tau.toFixed(2) + ' ' +
      vel_names[org.velocity] + ' ' +
      'prophecy:' + prophecy.fulfilled_total + '/' + prophecy.created_total;
    poems_div.appendChild(meta);

    // Generate
    let h = generate_haiku();
    let haiku_div = document.createElement('div');
    haiku_div.innerHTML = render_haiku(h);
    poems_div.appendChild(haiku_div);

    if (should_stop_cycle()) break;
    inter_haiku_update();
  } while (true);

  // Footer
  let footer = document.createElement('div');
  footer.className = 'cycle-footer';
  footer.innerHTML = org.haiku_in_cycle + ' haiku &middot; mass ' + org.acc_mass.toFixed(1) +
    ' &middot; julia ' + org.julia.toFixed(2);
  poems_div.appendChild(footer);

  // Scroll
  poems_div.lastChild.scrollIntoView({ behavior: 'smooth', block: 'end' });

  // Save spore
  spore_save();
}

/* ─── INIT ───────────────────────────────────────────────────────── */
function init() {
  rng_seed(Date.now() >>> 0);
  load_vocabulary();
  build_vocab_index();
  build_rhyme_table();
  let corpus_lines = load_all_corpora();
  organism_init();
  spore_load();

  // Generate first poem on load
  setTimeout(() => generate_cycle(), 100);

  // Input handler
  document.getElementById('prompt').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && this.value.trim()) {
      let text = this.value.trim();
      this.value = '';
      ingest_prompt(text);
      generate_cycle();
    }
  });
}

init();
